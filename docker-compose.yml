version: '3.8'

services:
  base_datos:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: AgentCraftA12
      POSTGRES_PASSWORD: Agent12CraftA
      POSTGRES_DB: agentecraft
    volumes:
      - datos_postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U AgentCraftA12 -d agentecraft"]
      interval: 10s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  servidor:
    build: ./servidor
    command: uvicorn app.principal:aplicacion --host 0.0.0.0 --port 8000 --reload
    env_file:
      - servidor/.env
    volumes:
      - ./servidor:/app
    ports:
      - "8000:8000"
    depends_on:
      base_datos:
        condition: service_healthy
      cache:
        condition: service_healthy
    environment:
      URL_BASE_DATOS: "postgresql://AgentCraftA12:Agent12CraftA@base_datos:5432/agentecraft"
  cliente:
    build: ./cliente
    command: npm run dev -- --host
    volumes:
      - ./cliente:/app
      - /app/node_modules
    ports:
      - "3000:5173"
    env_file:
      - cliente/.env
    depends_on:
      - servidor

volumes:
  datos_postgres:
